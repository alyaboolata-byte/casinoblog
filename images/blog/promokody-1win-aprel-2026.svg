<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0a1128"/>
<stop offset="100%" stop-color="#001f54"/>
</linearGradient>
<linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#ffb400"/>
<stop offset="100%" stop-color="#ff6b35"/>
</linearGradient>
<radialGradient id="glow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#ffb400" stop-opacity="0.2"/>
<stop offset="100%" stop-color="#ffb400" stop-opacity="0"/>
</radialGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
</filter>
</defs>
<rect width="1200" height="630" fill="url(#bg)"/>
<circle cx="1050" cy="150" r="280" fill="url(#glow)"/>
<circle cx="180" cy="520" r="260" fill="url(#glow)"/>
<g fill="#ffb400" opacity="0.12">
<circle cx="100" cy="80" r="3"/><circle cx="130" cy="80" r="2.5"/><circle cx="100" cy="110" r="2.5"/>
</g>
<!-- BLOG badge -->
<g transform="translate(120, 100)">
<rect x="0" y="0" width="110" height="32" rx="16" fill="#ffb400" opacity="0.15"/>
<text x="55" y="22" font-family="Arial" font-weight="800" font-size="13" fill="#ffb400" text-anchor="middle" letter-spacing="2">БЛОГ 2026</text>
</g>
<!-- Icon badge -->
<g transform="translate(120, 200)" filter="url(#shadow)">
<rect x="0" y="0" width="160" height="160" rx="28" fill="url(#accent)"/>
<g transform="translate(20,20)" color="#0a1128"><rect x="20" y="35" width="80" height="50" rx="6" fill="none" stroke="currentColor" stroke-width="3"/><path d="M 20 55 L 100 55 M 55 35 L 55 85 M 65 35 L 65 85" stroke="currentColor" stroke-width="2"/></g>
</g>
<!-- Title -->
<text x="340" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="#ffffff" letter-spacing="-1">Промокоды 1win</text>
<text x="340" y="305" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="28" fill="#ffb400">Апрель 2026 · до 500 000 ₽</text>
<rect x="340" y="335" width="240" height="4" fill="url(#accent)"/>
<text x="340" y="520" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="22" fill="#ff6b35">CasinoBlog.ru · блог</text>
<text x="120" y="595" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="14" fill="#ffb400" opacity="0.45" letter-spacing="3">АКТУАЛЬНЫЕ НОВОСТИ · АНАЛИТИКА · ПРОМОКОДЫ 2026</text>
</svg>